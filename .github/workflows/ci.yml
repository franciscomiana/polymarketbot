name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run fetch_polymarket
        run: python scripts/fetch_polymarket.py --query "London temperature" --limit 1
      - name: Run fetch_weather
        run: python scripts/fetch_weather.py --city "London"
      - name: Run train_xgb
        run: python models/train_xgb.py --city "London"
